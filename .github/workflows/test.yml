name: Test
on:
  push:
    branches:
      - main
      - dev
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Typecheck lism-css
        id: typecheck-lism-css
        run: pnpm --filter lism-css run typecheck
        continue-on-error: true

      - name: Typecheck docs
        id: typecheck-docs
        run: pnpm --filter lism-docs run typecheck
        continue-on-error: true

      - name: Run lint
        id: lint
        run: pnpm lint
        continue-on-error: true

      - name: Run tests
        id: tests
        run: pnpm test
        continue-on-error: true

      - name: Check results
        if: always()
        run: |
          if [ "${{ steps.typecheck-lism-css.outcome }}" = "failure" ] || \
             [ "${{ steps.typecheck-docs.outcome }}" = "failure" ] || \
             [ "${{ steps.lint.outcome }}" = "failure" ] || \
             [ "${{ steps.tests.outcome }}" = "failure" ]; then
            exit 1
          fi
