packages:
  - 'packages/*'
  - 'apps/*'
  - 'apps/playgrounds/*'
  - 'examples/*'

overrides:
  '@vitest/expect': $vitest
  '@vitest/spy': $vitest
  # セキュリティ: Dependabot alert 対応（推移的依存の patch 更新）
  'vite@<6.4.2': '^6.4.2' # GHSA: Arbitrary File Read / Path Traversal (#81, #88)
  'vite@>=7 <7.3.2': '^7.3.2' # GHSA: Arbitrary File Read / fs.deny bypass / Path Traversal (#78, #79, #80)
  'hono@<4.12.14': '^4.12.14' # GHSA: HTML injection / cookie / IP / path traversal 等 (#83-#89)
  '@hono/node-server@<1.19.13': '^1.19.13' # GHSA: Middleware bypass via repeated slashes (#82)

# ビルドスクリプトの実行を許可するパッケージ (pnpm 10 で必要になった)
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - sharp
  - workerd

# サプライチェーン攻撃対策: パッケージの信頼レベルが以前のリリースより低下した場合、インストールを失敗させる
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 525600 # 1年以上前に公開されたパッケージは除外
trustPolicyExclude:
  - 'vite@6.4.1' # publish方法変更による検出（trusted publisher → provenance）

# サプライチェーン攻撃対策: 公開から3日未満のバージョンはインストールしない
minimumReleaseAge: 4320
minimumReleaseAgeExclude:
  - 'lism-css' # 自プロジェクトのパッケージは除外
  - '@lism-css/*'
